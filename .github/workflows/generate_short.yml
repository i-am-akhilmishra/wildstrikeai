name: WildStrikeAI - Generate YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'   # Runs daily at 9 AM UTC — edit as you like
  workflow_dispatch:        # Manual trigger from GitHub Actions tab
    inputs:
      video_num:
        description: 'Video number for today (video1 or video2)'
        required: false
        default: 'video1'

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Generate video — runs automatically
  # ─────────────────────────────────────────────
  generate:
    name: 🎬 Generate Video
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      artifact_date: ${{ env.ARTIFACT_DATE }}
      artifact_vid:  ${{ env.ARTIFACT_VID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: |
          pip uninstall -y google-generativeai || true
          pip install -r requirements.txt

      - name: Generate script, voiceover, footage & assemble video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_video.py

      - name: Rename outputs with date and video number
        run: |
          DATE=$(date -u +%Y-%m-%d)
          VID=${{ github.event.inputs.video_num || 'video1' }}
          mv final_short.mov ${DATE}_${VID}.mov
          mv thumbnail.jpg   ${DATE}_${VID}_thumbnail.jpg
          mv script.txt      ${DATE}_${VID}_script.txt
          echo "ARTIFACT_DATE=${DATE}" >> $GITHUB_ENV
          echo "ARTIFACT_VID=${VID}"  >> $GITHUB_ENV

      - name: Upload review package (video + script + thumbnail)
        uses: actions/upload-artifact@v4
        with:
          name: review-${{ env.ARTIFACT_DATE }}-${{ env.ARTIFACT_VID }}
          path: |
            ${{ env.ARTIFACT_DATE }}_${{ env.ARTIFACT_VID }}.mov
            ${{ env.ARTIFACT_DATE }}_${{ env.ARTIFACT_VID }}_thumbnail.jpg
            ${{ env.ARTIFACT_DATE }}_${{ env.ARTIFACT_VID }}_script.txt
          retention-days: 5

  # ─────────────────────────────────────────────
  # JOB 2: Upload to YouTube — waits for approval
  # ─────────────────────────────────────────────
  upload:
    name: 🚀 Upload to YouTube
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production   # ← pauses here, sends you approval email

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download approved video package
        uses: actions/download-artifact@v4
        with:
          name: review-${{ needs.generate.outputs.artifact_date }}-${{ needs.generate.outputs.artifact_vid }}

      - name: Restore standard filenames for upload script
        run: |
          mv *_video*.mov final_short.mov       || true
          mv *_thumbnail.jpg thumbnail.jpg       || true
          mv *_script.txt script.txt             || true

      - name: Upload approved Short to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python upload_video.py
