name: WildStrikeAI - Generate YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'   # Runs daily at 9 AM UTC — edit as you like
  workflow_dispatch:        # Manual trigger from GitHub Actions tab

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Generate video — runs automatically
  # ─────────────────────────────────────────────
  generate:
    name: 🎬 Generate Video
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python dependencies
        run: |
          pip uninstall -y google-generativeai || true
          pip install -r requirements.txt

      - name: Generate script, voiceover, footage & assemble video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_video.py

      - name: Upload review package (video + script + thumbnail)
        uses: actions/upload-artifact@v4
        with:
          name: review-package
          path: |
            final_short.mov
            thumbnail.jpg
            script.txt
          retention-days: 5

  # ─────────────────────────────────────────────
  # JOB 2: Upload to YouTube — waits for approval
  # ─────────────────────────────────────────────
  upload:
    name: 🚀 Upload to YouTube
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production   # ← pauses here, sends you approval email

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download approved video package
        uses: actions/download-artifact@v4
        with:
          name: review-package

      - name: Upload approved Short to YouTube
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python upload_video.py
